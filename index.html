<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mask Dungeon</title>
  <style>
    body {
      margin: 0;
      background: #05030a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      font-family: system-ui, sans-serif;
    }
    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    canvas {
      border: 2px solid #7b3df2;
      box-shadow: 0 0 20px #7b3df2;
      background: #05030a;
    }
    #info {
      font-size: 14px;
      text-align: center;
      color: #cbb7ff;
    }
  </style>
</head>
<body>
<div id="game-container">
  <canvas id="game" width="480" height="480"></canvas>
  <div id="info">
    Arrow keys: tap to change direction • Collect key → open door → reach exit • Avoid spikes
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let levelNumber = 1;
let TILE = 24;
let COLS = 30;
let ROWS = 30;

const EMPTY = 0;
const WALL = 1;
const SPIKE = 2;
const COIN = 3;
const KEY = 4;
const DOOR = 5;
const EXIT = 6;

let grid = [];
let player = { x: 1, y: 1, dirX: 1, dirY: 0, hasKey: false, alive: true };
let doorOpen = false;

// RANDOM INTEGER
function r(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// GENERATE RANDOM LABYRINTH + CHAOS MAZE
function generateMaze() {
  // Increase map size slowly
  COLS = 30 + levelNumber * 2;
  ROWS = 30 + levelNumber * 2;

  canvas.width = COLS * TILE;
  canvas.height = ROWS * TILE;

  grid = Array.from({ length: ROWS }, () => Array(COLS).fill(WALL));

  // Carve random paths
  for (let y = 1; y < ROWS - 1; y++) {
    for (let x = 1; x < COLS - 1; x++) {
      if (Math.random() < 0.45) grid[y][x] = EMPTY; // medium density
      if (Math.random() < 0.10) grid[y][x] = SPIKE; // chaos spikes
      if (Math.random() < 0.05) grid[y][x] = COIN;
    }
  }

  // Entrance room
  for (let y = 1; y < 4; y++) {
    for (let x = 1; x < 4; x++) {
      grid[y][x] = EMPTY;
    }
  }

  player.x = 2;
  player.y = 2;

  // Place key
  let keyX = r(5, COLS - 5);
  let keyY = r(5, ROWS - 5);
  grid[keyY][keyX] = KEY;

  // Place door
  let doorX = r(5, COLS - 5);
  let doorY = r(5, ROWS - 5);
  grid[doorY][doorX] = DOOR;

  // Place exit far away
  let exitX = COLS - r(3, 6);
  let exitY = ROWS - r(3, 6);
  grid[exitY][exitX] = EXIT;

  doorOpen = false;
  player.hasKey = false;
  player.alive = true;
}

// DRAW WALLS
function drawWall(x, y) {
  const px = x * TILE;
  const py = y * TILE;

  ctx.fillStyle = "#3b1a6b";
  ctx.fillRect(px, py, TILE, TILE);

  ctx.fillStyle = "#5a2b9a";
  ctx.fillRect(px + 3, py + 3, TILE - 6, TILE - 6);

  ctx.strokeStyle = "#2a104d";
  ctx.beginPath();
  ctx.moveTo(px + 6, py + 10);
  ctx.lineTo(px + 12, py + 10);
  ctx.moveTo(px + 10, py + 16);
  ctx.lineTo(px + 16, py + 16);
  ctx.stroke();
}

// DRAW SPIKE
function drawSpike(x, y) {
  const px = x * TILE;
  const py = y * TILE;
  ctx.fillStyle = "#ff3355";
  ctx.beginPath();
  ctx.moveTo(px + TILE / 2, py + 4);
  ctx.lineTo(px + 4, py + TILE - 4);
  ctx.lineTo(px + TILE - 4, py + TILE - 4);
  ctx.fill();
}

// DRAW COIN
function drawCoin(x, y) {
  const px = x * TILE + TILE / 2;
  const py = y * TILE + TILE / 2;
  ctx.fillStyle = "#ffd94a";
  ctx.beginPath();
  ctx.arc(px, py, TILE / 4, 0, Math.PI * 2);
  ctx.fill();
}

// DRAW KEY
function drawKey(x, y) {
  const px = x * TILE + TILE / 2;
  const py = y * TILE + TILE / 2;
  ctx.strokeStyle = "#ffeb6b";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(px - 4, py, 5, 0, Math.PI * 2);
  ctx.moveTo(px + 1, py);
  ctx.lineTo(px + 8, py);
  ctx.moveTo(px + 8, py);
  ctx.lineTo(px + 8, py - 4);
  ctx.moveTo(px + 8, py);
  ctx.lineTo(px + 8, py + 4);
  ctx.stroke();
}

// DRAW DOOR
function drawDoor(x, y) {
  const px = x * TILE;
  const py = y * TILE;
  ctx.fillStyle = doorOpen ? "#7bff7b" : "#2b0f4a";
  ctx.fillRect(px + 4, py + 2, TILE - 8, TILE - 4);
  ctx.strokeStyle = "#cbb7ff";
  ctx.strokeRect(px + 4, py + 2, TILE - 8, TILE - 4);
}

// DRAW EXIT
function drawExit(x, y) {
  const px = x * TILE;
  const py = y * TILE;
  ctx.fillStyle = "#f5ff9b";
  ctx.fillRect(px + 4, py + 4, TILE - 8, TILE - 8);
  ctx.strokeStyle = "#fff";
  ctx.strokeRect(px + 4, py + 4, TILE - 8, TILE - 8);
}

// DRAW PLAYER
function drawPlayer() {
  const px = player.x * TILE + TILE / 2;
  const py = player.y * TILE + TILE / 2;

  const gradient = ctx.createRadialGradient(px, py, 4, px, py, TILE / 1.2);
  gradient.addColorStop(0, "rgba(200,150,255,0.9)");
  gradient.addColorStop(1, "rgba(123,61,242,0)");
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(px, py, TILE / 1.6, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#e3b3ff";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(px, py, TILE / 2.4, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = "#b46bff";
  ctx.beginPath();
  ctx.arc(px, py, TILE / 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#05030a";
  ctx.beginPath();
  ctx.arc(px - 3, py - 2, 2, 0, Math.PI * 2);
  ctx.arc(px + 3, py - 2, 2, 0, Math.PI * 2);
  ctx.fill();
}

function isWall(x, y) {
  if (x < 0 || y < 0 || x >= COLS || y >= ROWS) return true;
  return grid[y][x] === WALL;
}

// UPDATE LOOP
function update() {
  if (!player.alive) return;

  let nx = player.x + player.dirX;
  let ny = player.y + player.dirY;

  if (!isWall(nx, ny)) {
    player.x = nx;
    player.y = ny;

    let tile = grid[ny][nx];

    if (tile === SPIKE) {
      player.alive = false;
      alert("You died! Restarting level.");
      generateMaze();
      return;
    }

    if (tile === KEY) {
      player.hasKey = true;
      grid[ny][nx] = EMPTY;
    }

    if (tile === DOOR) {
      if (player.hasKey) {
        doorOpen = true;
        grid[ny][nx] = EMPTY;
      } else {
        player.x -= player.dirX;
        player.y -= player.dirY;
      }
    }

    if (tile === EXIT) {
      levelNumber++;
      alert("Level " + levelNumber + "!");
      generateMaze();
      return;
    }

    if (tile === COIN) {
      grid[ny][nx] = EMPTY;
    }
  }
}

// DRAW LOOP
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      let t = grid[y][x];
      if (t === WALL) drawWall(x, y);
      if (t === SPIKE) drawSpike(x, y);
      if (t === COIN) drawCoin(x, y);
      if (t === KEY) drawKey(x, y);
      if (t === DOOR) drawDoor(x, y);
      if (t === EXIT) drawExit(x, y);
    }
  }

  drawPlayer();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp") player.dirX = 0, player.dirY = -1;
  if (e.key === "ArrowDown") player.dirX = 0, player.dirY = 1;
  if (e.key === "ArrowLeft") player.dirX = -1, player.dirY = 0;
  if (e.key === "ArrowRight") player.dirX = 1, player.dirY = 0;
});

generateMaze();
loop();

</script>
</body>
</html>
