<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mask Dungeon</title>
  <style>
    body {
      margin: 0;
      background: #05030a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      font-family: system-ui, sans-serif;
    }
    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    canvas {
      border: 2px solid #7b3df2;
      box-shadow: 0 0 20px #7b3df2;
      background: #05030a;
    }
    #info {
      font-size: 14px;
      text-align: center;
      color: #cbb7ff;
    }
  </style>
</head>
<body>
<div id="game-container">
  <canvas id="game" width="480" height="480"></canvas>
  <div id="info">
    Arrow keys: tap to change direction • Collect key → open door → reach exit • Avoid spikes
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const TILE = 24;
const COLS = 20;
const ROWS = 20;

// Tile types
const EMPTY = 0;
const WALL  = 1;
const SPIKE = 2;
const COIN  = 3;
const KEY   = 4;
const DOOR  = 5;
const EXIT  = 6;

// Simple dungeon layout (20x20)
let level = [
  "11111111111111111111",
  "1P000000000000000001",
  "1 111111111111111 01",
  "1 1K0000000000011 01",
  "1 11111111111111  01",
  "1   2   2   2     01",
  "1 111111111111111 01",
  "1 1   0000000   1 01",
  "1 1 111111111 1 1 01",
  "1 1 1       1 1 1 01",
  "1 1 1  2    1 1 1 01",
  "1 1 1       1 1 1 01",
  "1 1 111111111 1 1 01",
  "1 1   0000000   1 01",
  "1 111111111111111 01",
  "1      3      3   01",
  "1 111111111111111 01",
  "1 00000000000000D 01",
  "1 000000000000000E01",
  "11111111111111111111"
];

// Convert to numeric grid
let grid = [];
let player = { x: 0, y: 0, dirX: 1, dirY: 0, hasKey: false, alive: true };
let doorOpen = false;

for (let y = 0; y < ROWS; y++) {
  grid[y] = [];
  for (let x = 0; x < COLS; x++) {
    const ch = level[y][x] || "1";
    let t = EMPTY;
    if (ch === "1") t = WALL;
    else if (ch === "2") t = SPIKE;
    else if (ch === "3") t = COIN;
    else if (ch === "K") t = KEY;
    else if (ch === "D") t = DOOR;
    else if (ch === "E") t = EXIT;
    else if (ch === "P") {
      t = EMPTY;
      player.x = x;
      player.y = y;
    }
    grid[y][x] = t;
  }
}

// Draw stone-block purple dungeon walls
function drawWall(x, y) {
  const px = x * TILE;
  const py = y * TILE;
  ctx.fillStyle = "#3b1a6b";
  ctx.fillRect(px, py, TILE, TILE);

  // Stone blocks
  ctx.fillStyle = "#5a2b9a";
  ctx.fillRect(px + 3, py + 3, TILE - 6, TILE - 6);

  // Cracks / texture
  ctx.strokeStyle = "#2a104d";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(px + 6, py + 10);
  ctx.lineTo(px + 12, py + 10);
  ctx.moveTo(px + 10, py + 16);
  ctx.lineTo(px + 16, py + 16);
  ctx.stroke();
}

// Draw spike
function drawSpike(x, y) {
  const px = x * TILE;
  const py = y * TILE;
  ctx.fillStyle = "#ff3355";
  ctx.beginPath();
  ctx.moveTo(px + TILE / 2, py + 4);
  ctx.lineTo(px + 4, py + TILE - 4);
  ctx.lineTo(px + TILE - 4, py + TILE - 4);
  ctx.closePath();
  ctx.fill();
}

// Draw coin
function drawCoin(x, y) {
  const px = x * TILE + TILE / 2;
  const py = y * TILE + TILE / 2;
  ctx.fillStyle = "#ffd94a";
  ctx.beginPath();
  ctx.arc(px, py, TILE / 4, 0, Math.PI * 2);
  ctx.fill();
}

// Draw key
function drawKey(x, y) {
  const px = x * TILE + TILE / 2;
  const py = y * TILE + TILE / 2;
  ctx.strokeStyle = "#ffeb6b";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(px - 4, py, 5, 0, Math.PI * 2);
  ctx.moveTo(px + 1, py);
  ctx.lineTo(px + 8, py);
  ctx.moveTo(px + 8, py);
  ctx.lineTo(px + 8, py - 4);
  ctx.moveTo(px + 8, py);
  ctx.lineTo(px + 8, py + 4);
  ctx.stroke();
}

// Draw door
function drawDoor(x, y) {
  const px = x * TILE;
  const py = y * TILE;
  ctx.fillStyle = doorOpen ? "#7bff7b" : "#2b0f4a";
  ctx.fillRect(px + 4, py + 2, TILE - 8, TILE - 4);
  ctx.strokeStyle = "#cbb7ff";
  ctx.lineWidth = 2;
  ctx.strokeRect(px + 4, py + 2, TILE - 8, TILE - 4);
}

// Draw exit
function drawExit(x, y) {
  const px = x * TILE;
  const py = y * TILE;
  ctx.fillStyle = "#f5ff9b";
  ctx.fillRect(px + 4, py + 4, TILE - 8, TILE - 8);
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 2;
  ctx.strokeRect(px + 4, py + 4, TILE - 8, TILE - 8);
}

// Draw purple spirit player with soft + sharp glow
function drawPlayer() {
  const px = player.x * TILE + TILE / 2;
  const py = player.y * TILE + TILE / 2;

  // Soft glow
  const gradient = ctx.createRadialGradient(px, py, 4, px, py, TILE / 1.2);
  gradient.addColorStop(0, "rgba(200, 150, 255, 0.9)");
  gradient.addColorStop(1, "rgba(123, 61, 242, 0.0)");
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(px, py, TILE / 1.6, 0, Math.PI * 2);
  ctx.fill();

  // Sharp neon outline
  ctx.strokeStyle = "#e3b3ff";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(px, py, TILE / 2.4, 0, Math.PI * 2);
  ctx.stroke();

  // Core body
  ctx.fillStyle = "#b46bff";
  ctx.beginPath();
  ctx.arc(px, py, TILE / 3, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = "#05030a";
  ctx.beginPath();
  ctx.arc(px - 3, py - 2, 2, 0, Math.PI * 2);
  ctx.arc(px + 3, py - 2, 2, 0, Math.PI * 2);
  ctx.fill();
}

// Check if tile is solid wall
function isWall(x, y) {
  if (x < 0 || y < 0 || x >= COLS || y >= ROWS) return true;
  return grid[y][x] === WALL;
}

// Game loop: auto-run until wall, tap arrows to change direction
function update() {
  if (!player.alive) return;

  let nextX = player.x + player.dirX;
  let nextY = player.y + player.dirY;

  if (!isWall(nextX, nextY)) {
    player.x = nextX;
    player.y = nextY;

    const tile = grid[player.y][player.x];

    if (tile === SPIKE) {
      player.alive = false;
      alert("You were impaled by spikes…");
      window.location.reload();
      return;
    }

    if (tile === KEY) {
      player.hasKey = true;
      grid[player.y][player.x] = EMPTY;
    }

    if (tile === DOOR) {
      if (player.hasKey) {
        doorOpen = true;
        grid[player.y][player.x] = EMPTY;
      } else {
        // Block movement into closed door
        player.x -= player.dirX;
        player.y -= player.dirY;
      }
    }

    if (tile === EXIT) {
      alert("LEVEL COMPLETE! Mask spirit escapes the dungeon.");
      window.location.reload();
      return;
    }

    if (tile === COIN) {
      grid[player.y][player.x] = EMPTY;
    }
  } else {
    // Hit wall: stop until direction changes
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const t = grid[y][x];
      if (t === WALL) drawWall(x, y);
      else if (t === SPIKE) drawSpike(x, y);
      else if (t === COIN) drawCoin(x, y);
      else if (t === KEY) drawKey(x, y);
      else if (t === DOOR) drawDoor(x, y);
      else if (t === EXIT) drawExit(x, y);
    }
  }

  drawPlayer();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Tap arrows to change direction (auto-run style)
window.addEventListener('keydown', (e) => {
  if (!player.alive) return;
  if (e.key === "ArrowUp") {
    player.dirX = 0; player.dirY = -1;
  } else if (e.key === "ArrowDown") {
    player.dirX = 0; player.dirY = 1;
  } else if (e.key === "ArrowLeft") {
    player.dirX = -1; player.dirY = 0;
  } else if (e.key === "ArrowRight") {
    player.dirX = 1; player.dirY = 0;
  }
});

loop();
</script>
</body>
</html>
