<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mask Runner</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
    }
    canvas {
        display: block;
        margin: auto;
        background: #111;
    }
</style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const tile = 40;
let player = { x: 4, y: 10, dir: "up" };
let speed = 6;

const maze = [
"##########",
"#........#",
"#.####...#",
"#....#...#",
"#.##.#.#.#",
"#.#..#.#.#",
"#.#.##.#.#",
"#.#....#.#",
"#.######.#",
"#........#",
"#....C...#",
"#....^...#",
"#........#",
"##########"
];

function draw() {
    ctx.clearRect(0,0,400,600);

    for (let y=0; y<maze.length; y++) {
        for (let x=0; x<maze[y].length; x++) {
            let c = maze[y][x];
            if (c === "#") {
                ctx.fillStyle = "#222";
                ctx.fillRect(x*tile, y*tile, tile, tile);
            }
            if (c === "C") {
                ctx.fillStyle = "yellow";
                ctx.beginPath();
                ctx.arc(x*tile+20, y*tile+20, 10, 0, Math.PI*2);
                ctx.fill();
            }
            if (c === "^") {
                ctx.fillStyle = "red";
                ctx.fillRect(x*tile+10, y*tile+10, 20, 20);
            }
        }
    }

    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x*tile+5, player.y*tile+5, tile-10, tile-10);
}

function movePlayer() {
    let dx = 0, dy = 0;
    if (player.dir === "up") dy = -1;
    if (player.dir === "down") dy = 1;
    if (player.dir === "left") dx = -1;
    if (player.dir === "right") dx = 1;

    for (let i=0; i<speed; i++) {
        let nx = player.x + dx;
        let ny = player.y + dy;

        if (maze[ny][nx] === "#") break;

        player.x = nx;
        player.y = ny;

        if (maze[ny][nx] === "C") {
            maze[ny] = maze[ny].replace("C", ".");
        }

        if (maze[ny][nx] === "^") {
            alert("You hit a spike!");
            location.reload();
        }
    }
}

document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") player.dir = "up";
    if (e.key === "ArrowDown") player.dir = "down";
    if (e.key === "ArrowLeft") player.dir = "left";
    if (e.key === "ArrowRight") player.dir = "right";
});

function gameLoop() {
    movePlayer();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
